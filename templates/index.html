<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>PDF Web Tool</title>

    <style>
        body{
            font-family: Arial;
            background:#f5f5f5;
            padding:40px;
        }

        .container{
            max-width:700px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
        }

        textarea{
            width:100%;
            height:150px;
            margin-top:10px;
            padding:10px;
        }

        input[type=file]{
            margin-top:20px;
        }

        button{
            margin-top:20px;
            width:100%;
            padding:15px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }
    </style>

</head>
<body>

<div class="container">

    <h1>PDF Highlight Tool</h1>

    <form method="POST" enctype="multipart/form-data">

        <label>Chọn file PDF:</label>
        <input type="file" name="pdf_file" accept=".pdf">

        <br><br>

        <label>Nhập từ khóa (mỗi dòng 1 từ khóa):</label>

        <textarea name="keywords"></textarea>

        <button type="submit">
            Highlight PDF
        </button>

    </form>

</div>

</body>
</html>
